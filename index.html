  const m = el.id.match(/^(base|mid|apex)_(AFS|TZa|TZp|PZa|PZpl|PZpm|CZ)_(R|L)$/);
  if (!m) return;
  const color = OFFICIAL_COLORS[m[2]];
  if (color) {
    el.style.setProperty('fill', color, 'important');
    el.style.setProperty('stroke', '#1c1a17', 'important');
    el.style.setProperty('stroke-width', '1.4', 'important');
    el.style.setProperty('opacity', '1', 'important');
    el.style.setProperty('fill-opacity', '1', 'important');
  }
});

const sidePanel = document.getElementById('sidePanel');
const stageLabel = document.getElementById('stageLabel');
const lesionCountBadge = document.getElementById('lesionCountBadge');
let currentIdx = 0;
let selectedId = null;
let selectedAfsOrigin = 'PZ';
let editingLesionId = null; // id of lesion being edited, or null for a fresh draft
let draft = null; // in-progress fields for a new lesion

const lesions = {}; // sectorId -> array of { lesionId, zone, level, side, group, dwi, t2, dce, size, category }
let lesionCounter = 1;

function sectorsForLevel(level) {
  return Array.from(document.querySelectorAll(`#root .disc-layer[data-level="${level}"] [id]`))
    .filter(el => el.id.match(/^(base|mid|apex)_(AFS|TZa|TZp|PZa|PZpl|PZpm|CZ)_(R|L)$/));
}

function computeCategory(entry) {
  if (entry.group === 'PZ') {
    const d = entry.dwi;
    if (!d) return null;
    if (d === 3) return entry.dce === 'yes' ? 4 : 3;
    return d;
  }
  if (entry.group === 'TZ') {
    const t = entry.t2, d = entry.dwi;
    if (!t) return null;
    if (t === 2) return (d && d >= 4) ? 3 : 2;
    if (t === 3) return (d === 5) ? 4 : 3;
    return t;
  }
  return null;
}

function renderOptions(selectEl, options, current) {
  selectEl.innerHTML = '<option value="">-- seleziona categoria --</option>' +
    options.map(([n, desc]) => `<option value="${n}" ${current==n?'selected':''}>${n} — ${desc.slice(0,38)}${desc.length>38?'...':''}</option>`).join('');
}

function allLesionsFlat() {
  const out = [];
  Object.values(lesions).forEach(arr => arr.forEach(e => out.push(e)));
  return out;
}

function renderSidePanel() {
  if (!selectedId) {
    sidePanel.innerHTML = `
      <h3>Legenda ufficiale</h3>
      <div class="legend-row"><span class="swatch" style="background:#f2b9cf"></span>PZ &mdash; zona periferica (DWI/ADC dominante)</div>
      <div class="legend-row"><span class="swatch" style="background:#a9d9b3"></span>CZ &mdash; zona centrale (criteri PZ)</div>
      <div class="legend-row"><span class="swatch" style="background:#f2d06b"></span>TZ &mdash; transizione (T2W dominante)</div>
      <div class="legend-row"><span class="swatch" style="background:#8fd0d9"></span>AFS &mdash; stroma anteriore (criteri PZ o TZ)</div>
      <div class="sel-sub" style="margin-top:10px">Clicca un settore sulla mappa per iniziare lo scoring.</div>
      ${renderLesionList()}
    `;
    return;
  }
  const m = selectedId.match(/^(base|mid|apex)_(AFS|TZa|TZp|PZa|PZpl|PZpm|CZ)_(R|L)$/);
  const [, level, zone, side] = m;
  let group = ZONE_GROUP[zone];
  if (group === 'AFS') group = selectedAfsOrigin;

  const sectorLesions = lesions[selectedId] || [];
  let entry;
  if (editingLesionId) {
    entry = sectorLesions.find(e => e.lesionId === editingLesionId);
  } else {
    if (!draft || draft.sectorId !== selectedId) {
      draft = { sectorId: selectedId, zone, level, side, group };
    }
    entry = draft;
  }
  entry.group = group;

  let html = `
    <div class="sel-head">${zone} &mdash; ${LEVEL_NAMES[level]}, ${side === 'R' ? 'destro' : 'sinistro'}</div>
    <div class="sel-sub">${ZONE_NAMES[zone]}</div>
  `;

  if (sectorLesions.length > 0) {
    html += `<div class="lesion-list" style="margin-top:0;padding-top:0;border-top:none;"><h3>Lesioni in questo settore</h3>`;
    sectorLesions.forEach(e => {
      html += `<div class="lesion-item ${e.lesionId===editingLesionId?'editing':''}" data-lesion="${e.lesionId}">
        <span class="lesion-left"><span class="lesion-cat-chip" style="background:${CATEGORY_COLORS[e.category]}">${e.category}</span> Lesione #${e.lesionId}</span>
        <span class="lesion-remove" data-remove="${e.lesionId}">&times;</span>
      </div>`;
    });
    html += `</div><button class="link-add" id="newLesionBtn">+ Nuova lesione in questo settore</button>`;
  }

  if (ZONE_GROUP[zone] === 'AFS') {
    html += `
      <div class="field">
        <label>Origine più probabile della lesione</label>
        <div class="zone-toggle">
          <button data-origin="PZ" class="${group==='PZ'?'active':''}">Zona periferica</button>
          <button data-origin="TZ" class="${group==='TZ'?'active':''}">Zona transizione</button>
        </div>
      </div>
    `;
  }

  const opts = group === 'PZ' ? PZ_OPTIONS : TZ_OPTIONS;
  const primaryLabel = group === 'PZ' ? 'DWI/ADC (sequenza dominante)' : 'T2W (sequenza dominante)';
  const primaryVal = group === 'PZ' ? entry.dwi : entry.t2;

  html += `
    <div class="field">
      <label>${primaryLabel}</label>
      <select id="primarySelect"></select>
      <div class="opt-desc" id="primaryDesc"></div>
    </div>
  `;

  if (group === 'PZ' && entry.dwi === 3) {
    html += `
      <div class="field">
        <label>DCE (enhancement focale precoce)</label>
        <div class="zone-toggle">
          <button data-dce="no" class="${entry.dce==='no'?'active':''}">Assente</button>
          <button data-dce="yes" class="${entry.dce==='yes'?'active':''}">Presente</button>
        </div>
      </div>
    `;
  }
  if (group === 'TZ') {
    html += `
      <div class="field">
        <label>DWI/ADC (per regola di upgrade)</label>
        <select id="dwiSelect"></select>
        <div class="opt-desc" id="dwiDesc"></div>
      </div>
    `;
  }

  html += `
    <div class="field">
      <label>Diametro massimo (mm)</label>
      <input type="number" id="sizeInput" min="0" max="80" value="${entry.size || ''}" placeholder="es. 14">
    </div>
  `;

  const cat = computeCategory(entry);
  html += `
    <div class="result-box">
      <div class="result-cat" style="color:${cat ? CATEGORY_COLORS[cat] : '#a9b6c2'}">${cat || '--'}</div>
      <div class="result-label">Categoria PI-RADS</div>
    </div>
    <button class="primary" id="saveLesionBtn">${editingLesionId ? 'Aggiorna lesione' : 'Salva lesione in questo settore'}</button>
    ${editingLesionId ? '<button class="secondary" id="cancelEditBtn">Annulla modifica</button>' : ''}
  `;

  html += renderLesionList();

  sidePanel.innerHTML = html;

  sidePanel.querySelectorAll('[data-lesion]').forEach(item => {
    item.addEventListener('click', (e) => {
      if (e.target.dataset.remove) return;
      editingLesionId = Number(item.dataset.lesion);
      renderSidePanel();
    });
  });
  sidePanel.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = Number(btn.dataset.remove);
      lesions[selectedId] = (lesions[selectedId] || []).filter(e2 => e2.lesionId !== id);
      if (editingLesionId === id) editingLesionId = null;
      recolorSector(selectedId);
      updateLesionCountBadge(); generateReport();
      renderSidePanel();
    });
  });
  const newLesionBtn = document.getElementById('newLesionBtn');
  if (newLesionBtn) newLesionBtn.addEventListener('click', () => { editingLesionId = null; draft = null; renderSidePanel(); });
  const cancelBtn = document.getElementById('cancelEditBtn');
  if (cancelBtn) cancelBtn.addEventListener('click', () => { editingLesionId = null; renderSidePanel(); });

  const primarySelect = document.getElementById('primarySelect');
  renderOptions(primarySelect, opts, primaryVal);
  const primaryDesc = document.getElementById('primaryDesc');
  const updatePrimaryDesc = () => {
    const v = primarySelect.value;
    const found = opts.find(o => String(o[0]) === v);
    primaryDesc.textContent = found ? found[1] : '';
  };
  updatePrimaryDesc();
  primarySelect.addEventListener('change', () => {
    if (group === 'PZ') entry.dwi = Number(primarySelect.value) || null;
    else entry.t2 = Number(primarySelect.value) || null;
    updatePrimaryDesc();
    renderSidePanel();
  });

  if (group === 'PZ' && entry.dwi === 3) {
    sidePanel.querySelectorAll('[data-dce]').forEach(btn => {
      btn.addEventListener('click', () => {
        entry.dce = btn.dataset.dce;
        renderSidePanel();
      });
    });
  }
  if (group === 'TZ') {
    const dwiSelect = document.getElementById('dwiSelect');
    renderOptions(dwiSelect, PZ_OPTIONS, entry.dwi);
    const dwiDesc = document.getElementById('dwiDesc');
    const updateDwiDesc = () => {
      const v = dwiSelect.value;
      const found = PZ_OPTIONS.find(o => String(o[0]) === v);
      dwiDesc.textContent = found ? found[1] : '';
    };
    updateDwiDesc();
    dwiSelect.addEventListener('change', () => {
      entry.dwi = Number(dwiSelect.value) || null;
      updateDwiDesc();
      renderSidePanel();
    });
  }

  document.getElementById('sizeInput').addEventListener('input', (e) => {
    entry.size = e.target.value ? Number(e.target.value) : null;
  });

  if (ZONE_GROUP[zone] === 'AFS') {
    sidePanel.querySelectorAll('.zone-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedAfsOrigin = btn.dataset.origin;
        entry.group = selectedAfsOrigin;
        entry.dwi = null; entry.t2 = null; entry.dce = null;
        renderSidePanel();
      });
    });
  }

  const saveBtn = document.getElementById('saveLesionBtn');
  saveBtn.addEventListener('click', () => {
    entry.category = computeCategory(entry);
    if (!entry.category) return;
    if (!lesions[selectedId]) lesions[selectedId] = [];
    if (editingLesionId) {
      const idx = lesions[selectedId].findIndex(e => e.lesionId === editingLesionId);
      lesions[selectedId][idx] = entry;
    } else {
      entry.lesionId = lesionCounter++;
      lesions[selectedId].push(entry);
      editingLesionId = entry.lesionId;
      draft = null;
    }
    recolorSector(selectedId);
    updateLesionCountBadge(); generateReport();
    renderSidePanel();
  });
}

function renderLesionList() {
  const entries = allLesionsFlat().filter(e => e.category);
  if (entries.length === 0) return '';
  const maxCat = Math.max(...entries.map(e => e.category));
  let rows = entries.map(e => {
    const isIndex = e.category === maxCat;
    return `<div class="lesion-item" style="cursor:default">
      <span>${e.zone} &middot; ${LEVEL_NAMES[e.level]} ${e.side}${isIndex ? '<span class="index-tag">indice</span>' : ''}</span>
      <span class="lesion-cat-chip" style="background:${CATEGORY_COLORS[e.category]}">${e.category}</span>
    </div>`;
  }).join('');
  return `<div class="lesion-list"><h3>Tutte le lesioni dell'esame</h3>${rows}</div>`;
}

function updateLesionCountBadge() {
  const n = allLesionsFlat().filter(e => e.category).length;
  lesionCountBadge.textContent = `${n} lesion${n===1?'e':'i'} registrat${n===1?'a':'e'}`;
}

// ---------- exam metadata + report generation ----------
const meta = { institute:'', patient:'', dob:'', pid:'', physician:'', indication:'', psa:null, ap:null, lr:null, cc:null,
  precedenti:'', mdc:null, altri:'', nodes:'normal', sv:'normal', bones:'normal',
  nodesSite:'', nodesSize:null, bonesSite:'', bonesSize:null, bladder:'negative', bladderNote:'', svSide:'', fluid:'negative', fluidNote:'' };
const metaReadout = document.getElementById('metaReadout');
const reportOutput = document.getElementById('reportOutput');
let reportManuallyEdited = false;
reportOutput.addEventListener('input', () => { reportManuallyEdited = true; });

['metaInstitute','metaPatient','metaDob','metaPid','metaPhysician','metaPrecedenti','metaMdc','metaAltri'].forEach(id => {
  document.getElementById(id).addEventListener('input', (e) => {
    const map = { metaInstitute:'institute', metaPatient:'patient', metaDob:'dob', metaPid:'pid', metaPhysician:'physician',
      metaPrecedenti:'precedenti', metaMdc:'mdc', metaAltri:'altri' };
    const k = map[id];
    meta[k] = (id === 'metaMdc') ? (e.target.value ? Number(e.target.value) : null) : e.target.value;
  });
});

['nodesSite','nodesSize','bonesSite','bonesSize','bladderNote','svSide','fluidNote'].forEach(id => {
  document.getElementById(id).addEventListener('input', (e) => {

    generateReport();
  });
  document.getElementById(id).addEventListener('change', () => generateReport());
});

const EXAM_ON_VALUES = { nodes:'suspicious', bones:'suspicious', bladder:'positive', sv:'suspicious', fluid:'positive' };

function updateExamDetailVisibility(exam) {
  const detail = document.getElementById(`detail-${exam}`);
  if (!detail) return;
  detail.style.display = (meta[exam] === EXAM_ON_VALUES[exam]) ? 'flex' : 'none';
}

document.querySelectorAll('.exam-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const exam = btn.dataset.exam, val = btn.dataset.val;
    meta[exam] = val;
    document.querySelectorAll(`.exam-toggle[data-exam="${exam}"]`).forEach(b => b.classList.toggle('active', b.dataset.val === val));
    updateExamDetailVisibility(exam);
    generateReport();
  });
});

function computeVolumeDensity() {
  if (!(meta.ap && meta.lr && meta.cc)) return { volume:null, density:null };
  const volume = 0.52 * (meta.ap/10) * (meta.lr/10) * (meta.cc/10); // mm -> cm
  const density = (meta.psa && volume) ? meta.psa / volume : null;
  return { volume, density };
}

function updateMetaReadout() {
  const { volume, density } = computeVolumeDensity();
  const volTxt = volume ? volume.toFixed(1) + ' cc' : '--';
  const densTxt = density ? density.toFixed(2) + ' ng/ml/cc' + (density >= 0.20 ? ' (\u22650.20)' : '') : '-- ng/ml/cc';
  metaReadout.textContent = `${volTxt} \u00b7 ${densTxt}`;
}

['metaIndication','metaPsa','metaAp','metaLr','metaCc'].forEach(id => {
  document.getElementById(id).addEventListener('input', (e) => {
    const key = id.replace('meta','').toLowerCase();
    const map = { indication:'indication', psa:'psa', ap:'ap', lr:'lr', cc:'cc' };
    const k = map[key];
    meta[k] = id === 'metaIndication' ? e.target.value : (e.target.value ? Number(e.target.value) : null);
    updateMetaReadout();
    generateReport();
  });
});

const ZONE_ORIGIN_LABEL = { R: 'destro', L: 'sinistro' };
const ZONE_ORIGIN_LABEL_F = { R: 'destra', L: 'sinistra' };
const MACRO_ZONE = { PZa:'zona periferica', PZpl:'zona periferica', PZpm:'zona periferica', CZ:'zona centrale', TZa:'zona di transizione', TZp:'zona di transizione', AFS:'stroma fibromuscolare anteriore' };
const SUB_ZONE_PHRASE = { PZa:'versante anteriore', PZpl:'versante postero-laterale', PZpm:'versante posteromediale', TZa:'versante anteriore', TZp:'versante posteriore', CZ:'', AFS:'' };
const LEVEL_PHRASE = { base:'della base', mid:'del corpo medio', apex:"dell'apice" };

function lesionSentence(e) {
  const sub = SUB_ZONE_PHRASE[e.zone] ? `, ${SUB_ZONE_PHRASE[e.zone]} ${ZONE_ORIGIN_LABEL[e.side]}` : ` ${ZONE_ORIGIN_LABEL[e.side]}`;
  const seqPart = e.group === 'PZ'
    ? `DWI categoria ${e.dwi}${e.dwi === 3 ? `, DCE ${e.dce === 'yes' ? 'presente' : 'assente'}` : ''}`
    : `T2W categoria ${e.t2}${(e.t2===2||e.t2===3) && e.dwi ? `, DWI categoria ${e.dwi}` : ''}`;
  const sizePart = e.size ? `, ${e.size} mm di diametro massimo` : '';
  return `A livello ${LEVEL_PHRASE[e.level]}${sub}, area con caratteristiche di sospetto (${seqPart})${sizePart}: PI-RADS ${e.category}.`;
}

function zoneReferencePhrase(e) {
  const macro = MACRO_ZONE[e.zone];
  const sub = SUB_ZONE_PHRASE[e.zone];
  const parts = [macro];
  if (sub) parts.push(`${sub} ${ZONE_ORIGIN_LABEL_F[e.side]}`);
  parts.push(LEVEL_PHRASE[e.level]);
  return parts.join(', ');
}

function generateReport() {
  if (reportManuallyEdited) return;
  const entries = allLesionsFlat().filter(e => e.category).sort((a,b) => b.category - a.category);
  const pzEntries = entries.filter(e => e.group === 'PZ');
  const tzEntries = entries.filter(e => e.group === 'TZ');
  const { volume, density } = computeVolumeDensity();

  let L = [];
  if (meta.patient || meta.dob || meta.pid) {
    L.push(`Paziente: ${meta.patient || '....'}    Data di nascita: ${meta.dob || '....'}    ID: ${meta.pid || '....'}`);
    L.push('');
  }

  L.push(`Indagine condotta mediante acquisizioni multiplanari a diversa pesatura in T1, T2, completata con acquisizioni DW e con acquisizioni dopo somministrazione di mdc (Gadovist, ${meta.mdc != null ? meta.mdc : '..'} mL), secondo protocollo mpRM Prostatica.`);
  L.push('');
  L.push(`PRECEDENTI: ${meta.precedenti || ''}`);
  L.push('');
  L.push(`QUESITO DIAGNOSTICO: ${meta.indication || 'valutazione prostata.'}`);
  L.push('');
  L.push(`PSA: ${meta.psa != null ? meta.psa : '..'} ng/ml. PSA density: ${density != null ? density.toFixed(2) : '..'}`);
  L.push('');
  L.push(`GHIANDOLA PROSTATICA: diametri trasversi massimi di ${meta.ap && meta.lr ? (meta.ap/10).toFixed(1)+' x '+(meta.lr/10).toFixed(1) : '..'} cm, diametro cranio-caudale di ${meta.cc ? (meta.cc/10).toFixed(1) : '..'} cm, per un volume massimo di ${volume ? volume.toFixed(1) : '..'} cc`);
  L.push('');

  L.push('REGIONE PERIFERICA: nella sequenza dominante DWI ' + (pzEntries.length === 0
    ? 'non si apprezzano significative alterazioni di segnale.'
    : pzEntries.map(lesionSentence).join(' ')));
  L.push('');

  L.push('REGIONE TRANSIZIONALE: nella sequenza dominante T2-pesata ' + (tzEntries.length === 0
    ? 'non si apprezzano significative alterazioni di segnale.'
    : tzEntries.map(lesionSentence).join(' ')));
  L.push('');

  L.push('VESCICOLE SEMINALI: ' + (meta.sv === 'suspicious'
    ? `aspetto sospetto per infiltrazione neoplastica${meta.svSide ? ', lato ' + meta.svSide : ''}.`
    : 'nei limiti.'));
  L.push('');
  L.push('VESCICA: ' + (meta.bladder === 'positive'
    ? (meta.bladderNote || 'reperti patologici.')
    : 'la vescica presenta pareti lievemente ispessite ed irregolari come per ipertrofia della tonaca muscolare.'));
  L.push('');
  L.push('LINFONODI PELVICI: ' + (meta.nodes === 'suspicious'
    ? `linfonodo sospetto in sede ${meta.nodesSite || '....'}${meta.nodesSize ? ', di ' + meta.nodesSize + ' mm' : ''}.`
    : 'non significative linfoadenomegalie in corrispondenza delle principali catene della pelvi.'));
  L.push('');
  L.push('FALDA LIQUIDA: ' + (meta.fluid === 'positive'
    ? (meta.fluidNote || 'presente falda liquida periprostatica.')
    : 'non falda liquida.'));
  L.push('');
  L.push('OSSA: ' + (meta.bones === 'suspicious'
    ? `area sospetta in sede ${meta.bonesSite || '....'}${meta.bonesSize ? ', di ' + meta.bonesSize + ' mm' : ''}.`
    : 'non evidenza di franche lesioni focali nel volume di acquisizione.'));
  L.push('');
  L.push(`ALTRI RILIEVI: ${meta.altri || ''}`);
  L.push('');

  L.push('CONCLUSIONI:');
  if (entries.length === 0) {
    L.push('Non si segnalano reperti target clinicamente significativi in questo esame.');
  } else {
    const idx = entries[0];
    L.push(`Reperto principale: PI-RADS ${idx.category}, localizzato in ${zoneReferencePhrase(idx)}.`);
    if (entries.length > 1) L.push(`Ulteriori ${entries.length - 1} reperto/i di categoria inferiore (vedi sopra).`);
    L.push('Linfonodi pelvici: ' + (meta.nodes === 'suspicious' ? `sospetti (${meta.nodesSite || '....'}${meta.nodesSize ? ', ' + meta.nodesSize + ' mm' : ''}).` : 'non significativi.') +
      '  Vescicole seminali: ' + (meta.sv === 'suspicious' ? `sospette${meta.svSide ? ' ('+meta.svSide+')' : ''}.` : 'nei limiti.') +
      '  Reperti ossei: ' + (meta.bones === 'suspicious' ? `sospetti (${meta.bonesSite || '....'}${meta.bonesSize ? ', ' + meta.bonesSize + ' mm' : ''}).` : 'non evidenti.'));
    if (idx.category >= 4) L.push('Si raccomanda biopsia mirata (fusion-guided) sul settore indicato.');
    else if (idx.category === 3) L.push('Reperto da valutare in base al contesto clinico (PSA, PSA density, precedenti biopsie).');
    else L.push('Follow-up secondo protocollo clinico.');
  }
  L.push('');
  L.push('SCALA SISTEMA di REFERTAZIONE PI-RADS (Prostate Imaging-Reporting and Data System version 2.1)');
  L.push('1 = neoplasia significativa altamente improbabile');
  L.push('2 = neoplasia significativa improbabile');
  L.push('3 = neoplasia significativa dubbia');
  L.push('4 = neoplasia significativa probabile');
  L.push('5 = neoplasia significativa altamente probabile');

  reportOutput.value = L.join('\n');
}

document.getElementById('regenReportBtn').addEventListener('click', () => {
  reportManuallyEdited = false;
  generateReport();
});

document.getElementById('copyReportBtn').addEventListener('click', () => {
  reportOutput.select();
  navigator.clipboard.writeText(reportOutput.value).then(() => {
    const btn = document.getElementById('copyReportBtn');
    const original = btn.textContent;
    btn.textContent = 'Copiato!';
    setTimeout(() => { btn.textContent = original; }, 1500);
  }).catch(() => {
    document.execCommand('copy');
  });
});

document.getElementById('printReportBtn').addEventListener('click', () => {
  const printArea = document.getElementById('printArea');
  const sectorPattern = /^(base|mid|apex)_(AFS|TZa|TZp|PZa|PZpl|PZpm|CZ)_(R|L)$/;

  const litSectorsByLevel = {};
  LEVEL_ORDER.forEach(l => litSectorsByLevel[l] = new Set());
  Object.keys(lesions).forEach(id => {
    if (lesions[id].some(e => e.category)) {
      const m = id.match(sectorPattern);
      if (m) litSectorsByLevel[m[1]].add(id);
    }
  });

  const mapsHtml = LEVEL_ORDER.map(level => {
    const svgEl = document.querySelector(`#root .disc-layer[data-level="${level}"] svg`);
    const clone = svgEl.cloneNode(true);
    const lit = litSectorsByLevel[level];
    clone.querySelectorAll('[id]').forEach(el => {
      if (el.id.match(sectorPattern) && !lit.has(el.id)) {
        const existing = el.getAttribute('style') || '';
        el.setAttribute('style', existing + ';filter:grayscale(1) brightness(0.95);');
      }
    });
    return `<figure class="ph-map-fig"><div>${clone.outerHTML}</div><figcaption>${LEVEL_NAMES[level]}</figcaption></figure>`;
  }).join('');

  printArea.innerHTML = `
    <div class="ph-header">
      <div>${meta.institute ? '<strong>'+meta.institute+'</strong>' : ''}</div>
      <div class="ph-patient-box">
        ${meta.patient ? '<b>'+meta.patient+'</b><br>' : ''}
        ${meta.dob ? 'Data di nascita: '+meta.dob+'<br>' : ''}
        ${meta.pid ? 'ID Paziente: '+meta.pid : ''}
      </div>
    </div>
    <div class="ph-title">RM MULTIPARAMETRICA DELLA PROSTATA</div>
    <div class="ph-body">
      <div class="ph-left">
        <div class="ph">${reportOutput.value.replace(/</g,'&lt;')}</div>
      </div>
      <div class="ph-right">${mapsHtml}</div>
    </div>
  `;
  window.print();
});

function recolorSector(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const arr = (lesions[id] || []).filter(e => e.category);
  if (arr.length === 0) {
    el.style.setProperty('stroke', '#1c1a17', 'important');
    el.style.setProperty('stroke-width', '1.4', 'important');
    return;
  }
  const maxCat = Math.max(...arr.map(e => e.category));
  el.style.setProperty('stroke', CATEGORY_COLORS[maxCat], 'important');
  el.style.setProperty('stroke-width', '4', 'important');
}

function attachClicks() {
  LEVEL_ORDER.forEach(level => {
    sectorsForLevel(level).forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const sectors = sectorsForLevel(level);
        if (selectedId === el.id) {
          sectors.forEach(s => s.classList.remove('sector-dimmed'));
          selectedId = null;
          editingLesionId = null; draft = null;
          renderSidePanel();
          return;
        }
        selectedId = el.id;
        editingLesionId = null; draft = null;
        const existing = lesions[selectedId];
        selectedAfsOrigin = (existing && existing.length) ? existing[existing.length-1].group : 'PZ';
        sectors.forEach(s => s.classList.toggle('sector-dimmed', s.id !== el.id));
        renderSidePanel();
      });
    });
  });
}
attachClicks();
renderSidePanel();

function setLevel(idx) {
  idx = Math.max(0, Math.min(LEVEL_ORDER.length - 1, idx));
  currentIdx = idx;
  const level = LEVEL_ORDER[idx];
  document.querySelectorAll('#root .disc-layer').forEach(l => l.classList.toggle('active', l.dataset.level === level));
  stageLabel.textContent = LEVEL_NAMES[level];
  selectedId = null;
  editingLesionId = null; draft = null;
  sectorsForLevel(level).forEach(s => s.classList.remove('sector-dimmed'));
  renderSidePanel();
}
setLevel(0);
updateMetaReadout();
generateReport();

document.getElementById('prevBtn').addEventListener('click', () => setLevel(currentIdx - 1));
document.getElementById('nextBtn').addEventListener('click', () => setLevel(currentIdx + 1));
const stage = document.getElementById('stage');
stage.addEventListener('wheel', (e) => { e.preventDefault(); setLevel(currentIdx + (e.deltaY > 0 ? 1 : -1)); }, { passive: false });
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') setLevel(currentIdx - 1);
  if (e.key === 'ArrowDown') setLevel(currentIdx + 1);
});
</script>
